<!DOCTYPE html>
<html lang="pt-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>
</head>
<body>
    <header>
        <h1>Bem vindo(a)</h1>
        <p>Pesquise abaixo o nome de um pokemon para ver nformações sobre ele.</p>
        <input type="text" id="input-pokemon" placeholder="Ex:Pikachu">
        <button id="botao-buscar">Buscar</button>
    </header>

    <div id="card" class="card">
        <img id="imagem-pokemon" src="" alt="Imagem do pokemon">
        <h2 id="nome-pokemon"></h2>
        <p id="numero-pokemon"></p>

        <div id="tipos">
            <span id="tipo1"></span>    
            <span id="tipo2"></span> 
        </div>

         
        <P id="peso"></P>
        <p id="altura"></p>
        <p id="habilidades"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
