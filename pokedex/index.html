<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokédex</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <h1>Pokédex</h1>

    <input type="text" id="input-busca" placeholder="Digite o nome do Pokémon..." />

    <section id="card-pokemon">
      <img src="" alt="Imagem do Pokémon" />
      <h2 id="nome-pokemon">Nome</h2>
      <div id="tipos-pokemon">
        <span id="tipo1"></span>
        <span id="tipo2"> </span>
       </div>
       <div id="stats-pokemon">
        <span id="hp"></span>
        <span id="ataque"></span>
        <span id="defesa"></span>
       </div>
    </section>
    <script src="script.js"></script>
  </body>
</html>
